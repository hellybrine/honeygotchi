services:
  honeygotchi:
    build: .
    image: honeygotchi:latest
    container_name: honeygotchi
    restart: unless-stopped
    ports:
      - "2222:2222"  # SSH honeypot — the only attacker-facing port
    expose:
      - "8080"       # stats API, only reachable inside the compose network
    volumes:
      - honeygotchi_logs:/app/logs
      - honeygotchi_data:/app/data
    networks:
      - honeygotchi_net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  dashboard:
    build: ./dashboard
    image: honeygotchi-dashboard:latest
    container_name: honeygotchi_dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      HONEYGOTCHI_URL: http://honeygotchi:8080
    networks:
      - honeygotchi_net
    depends_on:
      honeygotchi:
        condition: service_healthy

volumes:
  honeygotchi_data:
  honeygotchi_logs:

networks:
  honeygotchi_net:
    driver: bridge
